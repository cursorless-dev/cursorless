languageId: ruby
command:
  version: 6
  spokenForm: change name every class
  action:
    name: clearAndSetSelection
    target:
      type: primitive
      modifiers:
        - type: containingScope
          scopeType: {type: name}
        - type: everyScope
          scopeType: {type: class}
  usePrePhraseSnapshot: true
initialState:
  documentContents: |-
    class Aaa; end
    class Bbb; end
  selections:
    - anchor: {line: 1, character: 14}
      active: {line: 1, character: 14}
  marks: {}
finalState:
  documentContents: |-
    class Aaa; end
    class ; end
  selections:
    - anchor: {line: 1, character: 6}
      active: {line: 1, character: 6}
